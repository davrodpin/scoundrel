name: CI

on:
  pull_request:
    branches: ["*"]

permissions:
  contents: read

jobs:
  check:
    name: Check (fmt, lint, type-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
          cache-dependency-path: deno.lock
      - run: deno task prisma:generate
      - run: deno task check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true
          cache-dependency-path: deno.lock
      - run: deno task prisma:generate
      - run: deno task test:unit
